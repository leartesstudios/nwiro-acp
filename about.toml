# cargo-about configuration — generates THIRD-PARTY-LICENSES.md (publish gate P0-F).
#
# Regenerate the NOTICE after any dependency change:
#   cargo about generate about.hbs -o THIRD-PARTY-LICENSES.md
#
# The NOTICE must reflect only what is DISTRIBUTED in the release binary, so
# exclude dev- and build-dependencies (e.g. mockito → colored/MPL-2.0, insta) that
# are never linked into the shipped artifact. This is also why cargo-deny's graph
# does not flag colored: it is not in the runtime tree.
ignore-build-dependencies = true
ignore-dev-dependencies = true

# Keep `accepted` a superset of deny.toml's [licenses].allow. cargo-about picks
# the first accepted license for each crate's SPDX expression; the extra OR-branch
# entries (BSL-1.0, Unlicense) let it resolve dual-licensed crates without erroring.
accepted = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "CDLA-Permissive-2.0",
    "BSL-1.0",
    "Unlicense",
]

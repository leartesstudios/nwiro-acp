name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # Gate: a release tag must match the version baked into Cargo.toml.
  # A mismatch means the published assets (named from the tag) would
  # carry a binary that self-reports a different version — and the nwiro
  # auto-update resolver would download an artifact whose internal
  # version disagrees with its filename. Fail fast, before any build.
  verify-version:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          # Full history so the on-main ancestry check below can resolve.
          fetch-depth: 0
      - name: Assert Cargo.toml version matches the release tag
        shell: bash
        run: |
          tag_version="${GITHUB_REF_NAME#v}"
          cargo_version="$(grep -m1 '^version = ' Cargo.toml | sed -E 's/^version = "(.*)"/\1/')"
          echo "tag=${tag_version}  cargo=${cargo_version}"
          if [ "${tag_version}" != "${cargo_version}" ]; then
            echo "::error::Release tag ${GITHUB_REF_NAME} (version '${tag_version}') does not match Cargo.toml version '${cargo_version}'. Bump Cargo.toml or retag."
            exit 1
          fi
      - name: Assert the release tag is on main (releases come from main only)
        shell: bash
        run: |
          # Branch model: work lands on `development` and merges to `main` via PR.
          # A release MUST be tagged from a commit that is on main — never a stray
          # development/feature commit. Tags are NOT covered by branch protection,
          # so this is the gate that actually enforces "release from main only".
          git fetch --no-tags origin main
          if ! git merge-base --is-ancestor "$GITHUB_SHA" FETCH_HEAD; then
            echo "::error::Tag ${GITHUB_REF_NAME} (${GITHUB_SHA}) is not on main. Merge to main via PR first, then tag the main commit."
            exit 1
          fi
          echo "OK: ${GITHUB_REF_NAME} is on main."

  # Legal gate (P0-F): every distributed binary must ship third-party attribution.
  # Fails the release on a non-distribution-compatible license or a known security
  # advisory, then regenerates the NOTICE FRESH from Cargo.lock and attaches it — so
  # the shipped NOTICE is always current regardless of the committed copy (which CI
  # keeps fresh via its own self-version drift guard).
  licenses:
    needs: verify-version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install cargo-about + cargo-deny (prebuilt)
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-about,cargo-deny
      - name: Verify dependency licenses + security advisories
        run: cargo deny check advisories licenses
      - name: Generate third-party attribution NOTICE (fresh from Cargo.lock)
        run: cargo about generate about.hbs -o THIRD-PARTY-LICENSES.md
      - name: Upload the NOTICE as a build artifact (the release job publishes it)
        uses: actions/upload-artifact@v4
        with:
          name: dist-notice
          path: THIRD-PARTY-LICENSES.md
          if-no-files-found: error
          retention-days: 1

  build:
    needs: verify-version
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            ext: zip

          - target: aarch64-pc-windows-msvc
            os: windows-11-arm
            ext: zip

          # macOS: BOTH arches build on the macos-14 (Apple Silicon) runner.
          # x86_64 is CROSS-compiled there — Apple's toolchain is multi-arch —
          # which sidesteps the flaky macos-13 Intel runner that caused the
          # v0.1.13 Intel removal. Deployment target is pinned to 11.0 (job env
          # above), so both macOS binaries require macOS 11 (Big Sur) or later.
          - target: aarch64-apple-darwin
            os: macos-14
            ext: tar.gz

          - target: x86_64-apple-darwin
            os: macos-14
            ext: tar.gz

          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            ext: tar.gz
            cross: zigbuild
            zigbuild_target: x86_64-unknown-linux-gnu.2.28

          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            ext: tar.gz
            cross: zigbuild
            zigbuild_target: aarch64-unknown-linux-gnu.2.28

    runs-on: ${{ matrix.os }}
    env:
      # macOS: pin the deployment target so the macos-14 runner doesn't link
      # against macOS 14 SDK symbols and dyld-crash on macOS 11–13 Apple Silicon
      # Macs. Quoted so YAML keeps it the string "11.0" (not the float 11).
      # Harmless on Windows/Linux — only the Apple linker reads it. Symbol
      # stripping is handled by Cargo.toml [profile.release] strip=true, so no
      # RUSTFLAGS strip is needed here.
      MACOSX_DEPLOYMENT_TARGET: "11.0"

    steps:
      # @v5 pins to the Node.js 24 runtime so we don't trip GitHub's
      # June 2026 forced migration. Earlier @v4 still ran but emitted
      # a deprecation warning on every release build.
      - uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cargo-zigbuild
        if: matrix.cross == 'zigbuild'
        run: |
          cargo install cargo-zigbuild
          pip install ziglang

      - name: Build (zigbuild)
        if: matrix.cross == 'zigbuild'
        run: cargo zigbuild --release --target ${{ matrix.zigbuild_target }}

      - name: Build (native)
        if: matrix.cross != 'zigbuild'
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $version = $env:GITHUB_REF_NAME -replace '^v', ''
          $assetName = "local-llm-acp-${version}-${{ matrix.target }}.zip"
          $binary = "target/${{ matrix.target }}/release/local-llm-acp.exe"
          Copy-Item $binary 'local-llm-acp.exe'
          Compress-Archive -Path 'local-llm-acp.exe' -DestinationPath $assetName -Force
          Remove-Item 'local-llm-acp.exe'
          "ASSET_FILE=$assetName" | Out-File -Append $env:GITHUB_ENV -Encoding utf8

      - name: Package (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          ASSET_NAME="local-llm-acp-${VERSION}-${{ matrix.target }}.tar.gz"
          BINARY="target/${{ matrix.target }}/release/local-llm-acp"
          cp "$BINARY" 'local-llm-acp'
          tar czf "$ASSET_NAME" 'local-llm-acp'
          rm 'local-llm-acp'
          echo "ASSET_FILE=$ASSET_NAME" >> "$GITHUB_ENV"

      - name: Upload the packaged asset as a build artifact
        # NOT attached to the release here — the `release` job below assembles
        # ALL targets and publishes them in one shot, so a single failed target
        # can never leave a PARTIAL release that 404s the nwiro auto-updater.
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.target }}
          path: ${{ env.ASSET_FILE }}
          if-no-files-found: error
          retention-days: 1

  # Atomic publish. Runs ONLY if ALL 6 build legs AND the licenses job succeed:
  # a matrix job counts as failed if any leg fails, so `needs: build` skips this
  # job on a partial failure → the release is never created with a partial asset
  # set. Assembles every artifact, generates SHA256SUMS, and publishes in one shot.
  release:
    needs: [build, licenses]
    runs-on: ubuntu-latest
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: dist-*
          merge-multiple: true

      - name: Assert all 6 platform binaries are present before publishing
        shell: bash
        run: |
          cd dist
          ls -1
          count=$(ls local-llm-acp-* 2>/dev/null | wc -l)
          echo "platform binaries found: $count (expected 6)"
          [ "$count" -eq 6 ] || { echo "::error::expected 6 platform binaries, found $count — refusing to publish a partial release"; exit 1; }

      - name: Generate SHA256SUMS for the binaries
        shell: bash
        run: |
          cd dist
          sha256sum local-llm-acp-* > SHA256SUMS
          echo "----- SHA256SUMS -----"; cat SHA256SUMS

      - name: Publish the release with ALL assets at once (atomic)
        uses: softprops/action-gh-release@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fail_on_unmatched_files: true
          files: |
            dist/local-llm-acp-*
            dist/SHA256SUMS
            dist/THIRD-PARTY-LICENSES.md
